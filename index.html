    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; touch-action: pan-y; }
        
        /* DESKTOP BOXING - Keeps it looking like a phone on big screens */
        .app-shell {
            width: 100%;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            background: #111;
        }

        /* NATIVE VIDEO FEED */
        .feed {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
            background: #000;
        }
        .feed::-webkit-scrollbar { display: none; }

        .slide {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            filter: contrast(1.1) brightness(0.9);
        }

        /* HUD UI Elements */
        .hud-shadow {
            text-shadow: 0px 2px 10px rgba(0,0,0,0.9), 0px 0px 4px rgba(0,0,0,0.5);
        }

        .tuner-btn {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.3;
            transition: all 0.2s;
            text-align: left;
        }
        .tuner-btn.active { opacity: 1; }
        .tuner-btn.active::before {
            content: '■ ';
            font-size: 8px;
            vertical-align: middle;
            margin-right: 4px;
        }

        .overlay-menu {
            transition: transform 0.4s cubic-bezier(0.85, 0, 0.15, 1);
            background: rgba(0,0,0,0.98);
        }
    </style>
</head>

    <script>
        // ================= CLOUDINARY MEDIA DATABASE =================
        const channels = {
            featured:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856943/duet19_r9wyag.mp4",

                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856835/duet17_twjmqf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856663/duet16_wqgbjh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856656/duet15_efyme5.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856335/duet14_kbkj3b.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856654/duet13_fqyegf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856624/duet12_vqtdcu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856685/duet11_ws0hlu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856642/duet9_x42piu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856217/duet8_y7z0kj.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856600/duet7_ctichu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856825/duet6_e4bcvh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856946/duet5_llnphi.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772858770/duet4_xy7bfo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856926/duet1_xekrbc.mp4" 
            ],
            munchtime:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856577/munch16_n9zwcf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856535/munch15_l1u9pw.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856940/munch14_yfykbo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856937/munch13_izmxzv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856508/munch12_py2qhz.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856789/munch11_cehftv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856787/munch10_fuun0d.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856521/munch9_av3pxa.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856474/munch8_cg04mf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856445/munch7_vccuzr.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856414/munch5_joqhhr.mp4"
            ]
        };

        const feed = document.getElementById('feed');
        let observer;

        // LOAD CHANNEL LOGIC
        function switchChannel(channelName) {
            // Update UI
            document.querySelectorAll('.tuner-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${channelName}`).classList.add('active');

            // Clear Feed
            feed.innerHTML = '';
            if (observer) observer.disconnect();

            // Build Feed
            // preload="metadata" ensures it loads fast without chewing up the fan's data plan
            channels[channelName].forEach(src => {
                const slide = document.createElement('section');
                slide.className = 'slide';
                slide.innerHTML = `
                    <video src="${src}" loop playsinline muted preload="metadata"></video>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60 pointer-events-none"></div>
                `;
                feed.appendChild(slide);
            });

            // Re-initialize Auto-play (Intersection Observer)
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                        video.currentTime = 0; 
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.slide').forEach(s => observer.observe(s));
            feed.scrollTo(0,0);
        }

        // INIT
        switchChannel('featured');

        // UI CONTROLS
        function toggleMenu(id) {
            const menu = document.getElementById(id);
            if (id === 'links') {
                menu.classList.toggle('translate-y-full');
            } else {
                menu.classList.toggle('translate-x-full');
            }
        }

        // GLOBAL TAP TO UNMUTE
        let isMuted = true;
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('.slide')) {
                const videos = document.querySelectorAll('video');
                isMuted = !isMuted;
                videos.forEach(v => v.muted = isMuted);
                
                // Hide Toast
                document.getElementById('unmute-toast').style.opacity = '0';
            }
        });
    </script>
</body>
</html>
