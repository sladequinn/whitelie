<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { brutal:['"Inter Tight"', 'sans-serif'] },
                }

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; touch-action: pan-y; }
        
        /* DESKTOP BOXING */
        .app-shell {
            width: 100%;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            background: #111;
        }

        /* NATIVE VIDEO FEED (Continuous) */
        .feed {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
            background: #000;
            scroll-behavior: smooth;
        }
        .feed::-webkit-scrollbar { display: none; }

        .slide {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            pointer-events: none;
            filter: contrast(1.1) brightness(0.9);
            background-color: #000;
        }

        /* HUD UI Elements */
        .hud-shadow { text-shadow: 0px 2px 10px rgba(0,0,0,0.9), 0px 0px 4px rgba(0,0,0,0.5); }

        .tuner-btn {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.3;
            transition: all 0.2s;
            text-align: left;
        }
        .tuner-btn.active { opacity: 1; }
        .tuner-btn.active::before {
            content: '■ ';
            font-size: 8px;
            vertical-align: middle;
            margin-right: 4px;
        }

        .overlay-menu {
            transition: transform 0.4s cubic-bezier(0.85, 0, 0.15, 1);
            background: rgba(0,0,0,0.98);
        }

        /* BRUTALIST COVERFLOW W/ 3D FLIP */
        .coverflow-container {
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .coverflow-container::-webkit-scrollbar { display: none; }

        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        .album-side {
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            filter: grayscale(100%) brightness(0.5);
            transform: scale(0.85);
            border: 2px solid rgba(255,255,255,0.2);
            background: #000;
        }
        
        .album-info {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tap-indicator {
            opacity: 0;
            transition: opacity 0.4s;
        }

        /* The Active State (Color-Shock) */
        .cover-item.active-cover .album-side {
            filter: grayscale(0%) brightness(1.1);
            transform: scale(1);
            border: 4px solid white;
            box-shadow: 10px 10px 0px black, 12px 12px 0px rgba(255,255,255,0.2);
        }
        .cover-item.active-cover .album-info {
            opacity: 1;
            transform: translateY(0);
        }
        .cover-item.active-cover .tap-indicator {
            opacity: 1;
            animation: pulse-opacity 2s infinite;
        }

        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="font-brutal antialiased text-white selection:bg-white selection:text-black">

    <div class="app-shell">

        <!-- STORE OVERLAY (COVERFLOW) -->

            <div class="p-8 flex justify-between items-center shrink-0">

            </div>
            
            <!-- APPAREL BANNER -->
            <div class="px-8 pb-2 shrink-0">
                <div class="bg-black border-2 border-white p-4 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] uppercase tracking-[0.3em] opacity-60 font-black mb-1">Apparel</p>

                    <a href="https://buy.stripe.com/test_link" class="bg-white text-black px-4 py-2 font-black italic text-sm hover:invert transition-all">BUY (45)</a>
                </div>
            </div>

            <p class="px-8 pt-6 pb-2 text-[10px] uppercase tracking-[0.3em] opacity-40 font-black">Discography</p>

            <!-- THE BRUTALIST COVERFLOW W/ FLIP -->

                <!-- Albums injected here via JS -->
            </div>
            
            <p class="shrink-0 mt-auto text-[9px] bg-black uppercase font-black tracking-[0.3em] text-center border-t border-white/20 py-4">
                Hand-pressed & Shipped by WH!TE L!E

        </div>

    </div>

    <script>
        // ================= CLOUDINARY MEDIA DATABASE =================
        const rawChannels = {
            featured:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772865207/9ac2a10c-e3bd-4fa4-b3c1-7ddaaf0afd07_jtslel.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772865413/e4330852-b73c-4137-ad3b-8f5e9d4a828f_oktni5.mp4"
            ],
            duets:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856943/duet19_r9wyag.mp4",

                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856656/duet15_efyme5.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856335/duet14_kbkj3b.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856654/duet13_fqyegf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856624/duet12_vqtdcu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856685/duet11_ws0hlu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856642/duet9_x42piu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856217/duet8_y7z0kj.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856600/duet7_ctichu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856825/duet6_e4bcvh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856946/duet5_llnphi.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772858770/duet4_xy7bfo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856926/duet1_xekrbc.mp4" 
            ],
            munchtime:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856577/munch16_n9zwcf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856535/munch15_l1u9pw.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856940/munch14_yfykbo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856937/munch13_izmxzv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856508/munch12_py2qhz.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856789/munch11_cehftv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856787/munch10_fuun0d.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856521/munch9_av3pxa.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856474/munch8_cg04mf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856445/munch7_vccuzr.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856414/munch5_joqhhr.mp4"
            ]
        };

        // ================= ALBUM DATABASE (CHRONOLOGICAL) =================
        const albums =[
            { 
                title: "Antisocial Antihero", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186502/1_bbscj6.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186501/7_wurki1.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Hustle vs Hunger", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186230/20220525_175420_0000_fxxpae.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186245/20220525_210420_0000_serjc7.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Comfortably Complicated", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186419/Final_Comfortably_Complicated_gluzu0.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186445/back_cover_fdod6b.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Lost In Love", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773187056/Lost_In_Love_PA_f1xokm.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186561/lost_in_love_back_hjew14.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Definition of Determination", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186739/DOD_d1bytt.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/v1773186991/dod_back_cover_jsjjoo.png", 
                phys: "#", digi: "#" 
            }
        ];

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const feed = document.getElementById('feed');
        let observer;

        // ================= BUILD CONTINUOUS FEED =================
        function buildContinuousFeed() {
            const playlist =[
                ...rawChannels.featured.map(url => ({ url, category: 'featured' })),
                ...shuffle(rawChannels.duets).map(url => ({ url, category: 'duets' })),
                ...shuffle(rawChannels.munchtime).map(url => ({ url, category: 'munchtime' }))
            ];

            playlist.forEach((item, index) => {
                const slide = document.createElement('section');
                slide.className = 'slide';
                slide.id = `video-${index}`;
                slide.setAttribute('data-category', item.category);
                slide.innerHTML = `
                    <video src="${item.url}" loop playsinline muted preload="metadata"></video>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60 pointer-events-none"></div>
                `;
                feed.appendChild(slide);
            });

            const feedObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const currentCat = entry.target.getAttribute('data-category');

                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        document.querySelectorAll('.tuner-btn').forEach(btn => btn.classList.remove('active'));
                        const activeBtn = document.getElementById(`tab-${currentCat}`);
                        if(activeBtn) activeBtn.classList.add('active');
                    } else {
                        video.pause();
                        video.currentTime = 0; 
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.slide').forEach(s => feedObserver.observe(s));
        }

        // ================= BUILD BRUTALIST COVERFLOW W/ 3D FLIP =================
        function buildCoverflow() {
            const track = document.getElementById('coverflow-track');
            
            albums.forEach((album, index) => {
                const item = document.createElement('div');
                item.className = 'cover-item snap-center shrink-0 w-[72vw] max-w-[320px] flex flex-col items-center';
                
                // The 3D flip card structure
                item.innerHTML = `
                    <div class="relative w-full aspect-square perspective-1000 cursor-pointer" onclick="flipAlbum(this)">
                        <div class="flip-inner relative w-full h-full transition-transform duration-700 preserve-3d">
                            <!-- Front Cover -->
                            <div class="absolute inset-0 backface-hidden album-side">
                                <img src="${album.front}" class="w-full h-full object-cover">
                            </div>
                            <!-- Back Cover (Tracklist) -->
                            <div class="absolute inset-0 backface-hidden rotate-y-180 album-side">
                                <img src="${album.back}" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="tap-indicator absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] uppercase font-black tracking-[0.3em] text-white">
                            Tap to Flip ↺
                        </div>
                    </div>
                    
                    <div class="album-info w-full mt-10 text-center">
                        <h3 class="text-xl md:text-2xl font-black italic uppercase leading-none mb-4">${album.title}</h3>
                        <div class="flex gap-2 justify-center w-full">
                            <a href="${album.phys}" class="flex-1 bg-white text-black py-3 text-[10px] uppercase tracking-widest font-black italic hover:invert transition-all">PHYSICAL CD</a>
                            <a href="${album.digi}" class="flex-1 border-2 border-white/50 text-white py-3 text-[10px] uppercase tracking-widest font-black italic hover:bg-white hover:text-black transition-all">DIGITAL DL</a>
                        </div>
                    </div>
                `;
                track.appendChild(item);
            });

            // Intersection Observer for the Color-Shock effect
            const coverObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active-cover');
                    } else {
                        entry.target.classList.remove('active-cover');
                        // Reset flip when swiped away
                        const inner = entry.target.querySelector('.flip-inner');
                        if(inner.classList.contains('rotate-y-180')) inner.classList.remove('rotate-y-180');
                    }
                });
            }, { root: track, threshold: 0.7 });

            document.querySelectorAll('.cover-item').forEach(c => coverObserver.observe(c));
        }

        // Helper function for the 3D click flip
        function flipAlbum(element) {
            const inner = element.querySelector('.flip-inner');
            inner.classList.toggle('rotate-y-180');
        }

        // ================= APP INITIALIZATION =================
        buildContinuousFeed();
        buildCoverflow();

        // HUD ELEVATOR LOGIC
        function scrollToCategory(cat) {
            const targetSlide = document.querySelector(`.slide[data-category="${cat}"]`);
            if(targetSlide) {
                targetSlide.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // MENU TOGGLES
        function toggleMenu(id) {
            const menu = document.getElementById(id);
            if (id === 'links') {
                menu.classList.toggle('translate-y-full');
            } else {
                menu.classList.toggle('translate-x-full');
            }
        }

        // GLOBAL TAP TO UNMUTE
        let isMuted = true;
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('.slide')) {
                const videos = document.querySelectorAll('video');
                isMuted = !isMuted;
                videos.forEach(v => v.muted = isMuted);
                document.getElementById('unmute-toast').style.opacity = '0';
            }
        });
    </script>
</body>
