    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; touch-action: pan-y; }
        
        /* FILM GRAIN OVERLAY */
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* DESKTOP BOXING */
        .app-shell {
            width: 100%; height: 100dvh; max-width: 500px; margin: 0 auto;
            position: relative; background: #050505; overflow: hidden;
        }

        /* NATIVE VIDEO FEED */
        .feed {
            height: 100%; scroll-snap-type: y mandatory; overflow-y: scroll;
            scrollbar-width: none; scroll-behavior: smooth; background: #000;
        }
        .feed::-webkit-scrollbar { display: none; }
        .slide {
            height: 100%; scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        video {
            width: 100%; height: 100%; object-fit: contain; pointer-events: none;
            filter: contrast(1.15) brightness(0.9); background: #000;
        }

        /* HUD UI */
        .hud-shadow { text-shadow: 0px 2px 10px rgba(0,0,0,0.9), 0px 0px 4px rgba(0,0,0,0.5); }
        .tuner-btn {
            font-size: 11px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
            opacity: 0.3; transition: all 0.2s; text-align: left;
        }
        .tuner-btn.active { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .tuner-btn.active::before { content: '■ '; font-size: 8px; vertical-align: middle; margin-right: 4px; }

        .overlay-menu {
            transition: transform 0.5s cubic-bezier(0.85, 0, 0.15, 1);
            background: #000;
        }

        /* ================= WOW FACTOR: 3D PARALLAX STORE ================= */
        
        /* Vibrant Neon Ambient Glow */
        #store-bg {
            position: absolute; inset: -10%; z-index: 0;
            background-size: cover; background-position: center;
            filter: blur(15px) brightness(0.5) saturate(1.8);
            transition: background-image 0.5s ease;
        }

        .coverflow-container {
            scroll-snap-type: x mandatory; scrollbar-width: none; 
            padding: 0 50vw; /* Padding forces center alignment on first/last items */
            perspective: 1200px;
        }
        .coverflow-container::-webkit-scrollbar { display: none; }

        .album-wrapper {
            scroll-snap-align: center;
            width: 70vw; max-w: 300px; 
            margin: 0 -35vw; /* Overlap logic for tight spacing */
            padding: 0 4vw; /* Inner spacing */
            flex-shrink: 0;
            display: flex; flex-col; items-center; justify-center;
        }

        /* The 3D Jewel Case Architecture */
        .album-box {
            position: relative;
            width: 100%; aspect-ratio: 1/1;
            transform-style: preserve-3d;
            /* Rotation is handled dynamically via Javascript Parallax */
        }

        .album-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* 15px depth creates a 30px thick CD Case */
        .face-front { transform: translateZ(15px); }
        .face-back { transform: rotateY(180deg) translateZ(15px); }
        
        /* The Fake Spine */
        .face-spine-left {
            width: 30px; height: 100%;
            left: 0; top: 0;
            transform-origin: left;
            transform: translateX(0) rotateY(-90deg);
            /* Sleek plastic jewel case gradient */
            background: linear-gradient(90deg, #111 0%, #3a3a3a 20%, #1a1a1a 80%, #000 100%);
            border-left: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
        }

        /* Spine Typography */
        .spine-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 10px; font-weight: 900; letter-spacing: 2px;
            color: rgba(255,255,255,0.7); text-transform: uppercase;
            white-space: nowrap;
        }

        .glass-glare {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 40%);
        }

        /* Info & Buttons Fade In */
        .album-info-box {
            opacity: 0.3; transform: scale(0.9); transition: all 0.4s ease;
            height: 120px; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .album-wrapper.active-album .album-info-box {
            opacity: 1; transform: scale(1);
        }

        /* Store Background Marquee Text */
        .store-bg-text {
            position: absolute; top: 12%; left: -50%; width: 200%;
            font-size: 14rem; font-style: italic; font-weight: 900; line-height: 0.8;
            color: rgba(255,255,255,0.04); pointer-events: none; white-space: nowrap; z-index: 0;
            text-align: center;
        }
    </style>
</head>

    <script>
        // ================= CLOUDINARY MEDIA DATABASE =================

                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856445/munch7_vccuzr.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856414/munch5_joqhhr.mp4"
            ]
        };

        const albums =[
            { 
                title: "Antisocial Antihero", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186502/1_bbscj6.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186501/7_wurki1.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Hustle vs Hunger", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186230/20220525_175420_0000_fxxpae.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186245/20220525_210420_0000_serjc7.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Comfortably Complicated", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186419/Final_Comfortably_Complicated_gluzu0.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186445/back_cover_fdod6b.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Lost In Love", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773187056/Lost_In_Love_PA_f1xokm.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186561/lost_in_love_back_hjew14.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Definition of Determination", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186739/DOD_d1bytt.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186991/dod_back_cover_jsjjoo.png", 
                phys: "#", digi: "#" 
            }
        ];

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const feed = document.getElementById('feed');
        
        // ================= CONTINUOUS FEED ENGINE =================
        function buildContinuousFeed() {
            const playlist =[
                ...rawChannels.featured.map(url => ({ url, category: 'featured' })),
                ...shuffle(rawChannels.duets).map(url => ({ url, category: 'duets' })),
                ...shuffle(rawChannels.munchtime).map(url => ({ url, category: 'munchtime' }))
            ];

            playlist.forEach((item, index) => {
                const slide = document.createElement('section');
                slide.className = 'slide';
                slide.setAttribute('data-category', item.category);
                slide.innerHTML = `
                    <video src="${item.url}" loop playsinline muted preload="metadata"></video>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60 pointer-events-none"></div>
                `;
                feed.appendChild(slide);
            });

            const feedObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const currentCat = entry.target.getAttribute('data-category');

                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        document.querySelectorAll('.tuner-btn').forEach(btn => btn.classList.remove('active'));
                        const activeBtn = document.getElementById(`tab-${currentCat}`);
                        if(activeBtn) activeBtn.classList.add('active');
                    } else {
                        video.pause();
                        video.currentTime = 0; 
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.slide').forEach(s => feedObserver.observe(s));
        }

        // ================= 3D PARALLAX COVERFLOW =================
        function buildCoverflow() {
            const track = document.getElementById('coverflow-track');
            
            albums.forEach((album) => {
                const item = document.createElement('div');
                item.className = 'album-wrapper flex flex-col items-center';
                item.setAttribute('data-bg', album.front);
                
                // Construct the CSS 3D Box
                item.innerHTML = `
                    <div class="album-box">
                        <!-- Front Face -->
                        <div class="album-face face-front">
                            <img src="${album.front}" class="w-full h-full object-cover">
                            <div class="glass-glare"></div>
                        </div>
                        <!-- Fake Spine Face -->
                        <div class="album-face face-spine-left">
                            <span class="spine-text">WH!TE L!E - ${album.title}</span>
                        </div>
                        <!-- Back Face -->
                        <div class="album-face face-back">
                            <img src="${album.back}" class="w-full h-full object-cover">
                            <div class="glass-glare"></div>
                        </div>
                    </div>
                    
                    <!-- PERFECTLY ALIGNED TITLES & BUTTONS -->
                    <div class="album-info-box w-full mt-10 text-center">
                        <div class="h-14 flex items-center justify-center mb-3">
                            <h3 class="text-xl md:text-2xl font-black italic uppercase leading-tight drop-shadow-md px-4">${album.title}</h3>
                        </div>
                        <div class="flex gap-2 justify-center w-full">
                            <a href="${album.phys}" class="flex-1 bg-white text-black py-3 text-[10px] uppercase tracking-widest font-black italic hover:invert transition-all text-center shadow-lg">PHYSICAL</a>
                            <a href="${album.digi}" class="flex-1 border-2 border-white/50 text-white py-3 text-[10px] uppercase tracking-widest font-black italic hover:bg-white hover:text-black transition-all text-center bg-black/40 backdrop-blur-md">DIGITAL</a>
                        </div>
                    </div>
                `;
                track.appendChild(item);
            });

            // The Scroll-Linked 3D Engine
            function updateParallax() {
                const trackRect = track.getBoundingClientRect();
                const trackCenter = trackRect.left + trackRect.width / 2;
                const albumWrappers = document.querySelectorAll('.album-wrapper');

                albumWrappers.forEach(wrapper => {
                    const rect = wrapper.getBoundingClientRect();
                    const cardCenter = rect.left + rect.width / 2;
                    const offset = cardCenter - trackCenter;
                    
                    // Math: Calculates how far off center it is, and converts to a rotation degree
                    const percentage = offset / trackRect.width;
                    let angle = percentage * -160; 
                    
                    // Cap the spin so it doesn't break logic
                    angle = Math.max(-180, Math.min(180, angle));

                    // Apply the 3D Rotation to the Box
                    const box = wrapper.querySelector('.album-box');
                    box.style.transform = `rotateY(${angle}deg)`;

                    // Active State Trigger (For Glow & Background Change)
                    if (Math.abs(offset) < trackRect.width * 0.25) {
                        wrapper.classList.add('active-album');
                        const bgImg = wrapper.getAttribute('data-bg');
                        document.getElementById('store-bg').style.backgroundImage = `url('${bgImg}')`;
                    } else {
                        wrapper.classList.remove('active-album');
                    }
                });
                requestAnimationFrame(updateParallax);
            }
            // Kick off the physics engine
            requestAnimationFrame(updateParallax);
        }

        // ================= INIT & CONTROLS =================
        buildContinuousFeed();
        buildCoverflow();

        function scrollToCategory(cat) {
            const targetSlide = document.querySelector(`.slide[data-category="${cat}"]`);
            if(targetSlide) targetSlide.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            if (id === 'links') menu.classList.toggle('translate-y-full');
            else menu.classList.toggle('translate-x-full');
        }

        let isMuted = true;
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('.slide')) {
                const videos = document.querySelectorAll('video');
                isMuted = !isMuted;
                videos.forEach(v => v.muted = isMuted);
                document.getElementById('unmute-toast').style.opacity = '0';
            }
        });
    </script>
