<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WH!TE L!E | OFFICIAL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { brutal:['"Inter Tight"', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; touch-action: pan-y; }
        
        /* DESKTOP BOXING */
        .app-shell {
            width: 100%; height: 100dvh; max-width: 500px; margin: 0 auto;
            position: relative; background: #000; overflow: hidden;
        }

        /* NATIVE VIDEO FEED */
        .feed {
            height: 100%; scroll-snap-type: y mandatory; overflow-y: scroll;
            scrollbar-width: none; scroll-behavior: smooth; background: #000;
        }
        .feed::-webkit-scrollbar { display: none; }

        /* PERFECT VIDEO CENTERING */
        .slide {
            height: 100%; scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; background: #000; 
            display: flex; align-items: center; justify-content: center;
        }
        video {
            width: 100%; height: 100%; max-height: 100dvh;
            object-fit: contain; margin: 0 auto; pointer-events: none;
            filter: contrast(1.1) brightness(0.9);
        }

        /* HUD UI */
        .hud-shadow { text-shadow: 0px 2px 10px rgba(0,0,0,0.9), 0px 0px 4px rgba(0,0,0,0.5); }
        .tuner-btn {
            font-size: 11px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
            opacity: 0.3; transition: all 0.2s; text-align: left;
        }
        .tuner-btn.active { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .tuner-btn.active::before { content: '■ '; font-size: 8px; vertical-align: middle; margin-right: 4px; }

        .overlay-menu {
            transition: transform 0.5s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* ================= WOW FACTOR STORE UI ================= */
        
        /* Dynamic Ambient Background */
        #store-bg {
            position: absolute; inset: 0; z-index: 0;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.3);
            transition: background-image 0.6s ease;
        }

        .coverflow-container {
            scroll-snap-type: x mandatory; scrollbar-width: none;
            scroll-behavior: smooth; padding: 0 15vw;
        }
        .coverflow-container::-webkit-scrollbar { display: none; }

        .album-card {
            scroll-snap-align: center;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform: scale(0.8) translateY(20px);
            opacity: 0.4;
        }

        /* ACTIVE ALBUM STATE (Glow & Float) */
        .album-card.active-album {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* 3D FLIP MECHANICS */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        .flip-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .album-side {
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: box-shadow 0.5s, border 0.5s;
        }
        
        .album-card.active-album .album-side {
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 50px rgba(0,0,0,1), 0 0 30px rgba(255,255,255,0.1);
        }

        /* Glass Glare Effect */
        .glass-glare {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 40%);
        }

        .tap-indicator {
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .album-card.active-album .tap-indicator { opacity: 1; }
    </style>
</head>
<body class="font-brutal antialiased text-white selection:bg-white selection:text-black">

    <div class="app-shell">
        
        <!-- THE TUNER (TOP LEFT) -->
        <nav class="absolute top-10 left-6 z-[100] flex flex-col gap-4 items-start hud-shadow pointer-events-auto">

        <!-- STORE OVERLAY (IMMERSIVE 3D) -->
        <div id="store" class="fixed inset-0 z-[200] overlay-menu translate-x-full flex flex-col bg-black overflow-hidden">
            
            <!-- Dynamic Ambient Background -->
            <div id="store-bg"></div>
            
            <!-- Top Nav -->
            <div class="p-8 flex justify-between items-center shrink-0 relative z-10">
                <h2 class="text-6xl font-black italic tracking-tighter drop-shadow-lg">STORE</h2>
                <button onclick="toggleMenu('store')" class="text-4xl font-light drop-shadow-lg">✕</button>
            </div>
            
            <!-- APPAREL BANNER -->
            <div class="px-8 pb-4 shrink-0 relative z-10">
                <div class="bg-black/60 backdrop-blur-md border border-white/20 p-4 flex justify-between items-center shadow-2xl">
                    <div>
                        <p class="text-[9px] uppercase tracking-[0.3em] opacity-60 font-black mb-1">Apparel</p>
                        <p class="text-[14px] font-black italic tracking-tighter uppercase leading-tight">Hand-Pressed<br>Shirt</p>
                    </div>
                    <a href="#" class="bg-white text-black px-4 py-2 font-black italic text-xs hover:invert transition-all">BUY (45)</a>
                </div>
            </div>

            <!-- THE BRUTALIST 3D COVERFLOW -->
            <div id="coverflow-track" class="coverflow-container flex-1 flex overflow-x-auto items-center gap-12 pb-10 pt-4 relative z-10">
                <!-- Albums Injected via JS -->
            </div>
            
            <p class="shrink-0 mt-auto text-[9px] bg-black/80 backdrop-blur-md uppercase font-black tracking-[0.3em] text-center border-t border-white/10 py-5 relative z-20">
                Hand-pressed & Shipped by WH!TE L!E
            </p>
        </div>

    </div>

    <script>
        // ================= CLOUDINARY MEDIA DATABASE =================
        const rawChannels = {
            featured:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772865207/9ac2a10c-e3bd-4fa4-b3c1-7ddaaf0afd07_jtslel.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772865413/e4330852-b73c-4137-ad3b-8f5e9d4a828f_oktni5.mp4"
            ],
            duets:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856943/duet19_r9wyag.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856867/duet22_etriid.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856940/duet21_seeax3.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856727/duet20_dv5yxm.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856692/duet18_ufz9re.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856835/duet17_twjmqf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856663/duet16_wqgbjh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856656/duet15_efyme5.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856335/duet14_kbkj3b.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856654/duet13_fqyegf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856624/duet12_vqtdcu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856685/duet11_ws0hlu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856642/duet9_x42piu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856217/duet8_y7z0kj.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856600/duet7_ctichu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856825/duet6_e4bcvh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856946/duet5_llnphi.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772858770/duet4_xy7bfo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856926/duet1_xekrbc.mp4" 
            ],
            munchtime:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856577/munch16_n9zwcf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856535/munch15_l1u9pw.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856940/munch14_yfykbo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856937/munch13_izmxzv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856508/munch12_py2qhz.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856789/munch11_cehftv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856787/munch10_fuun0d.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856521/munch9_av3pxa.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856474/munch8_cg04mf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856445/munch7_vccuzr.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856414/munch5_joqhhr.mp4"
            ]
        };

        // ================= INSTANT LOAD IMAGE DATABASE =================
        // Injected w_600,q_auto,f_webp to guarantee millisecond loading
        const albums =[
            { 
                title: "Antisocial Antihero", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186502/1_bbscj6.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186501/7_wurki1.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Hustle vs Hunger", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186230/20220525_175420_0000_fxxpae.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186245/20220525_210420_0000_serjc7.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Comfortably Complicated", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186419/Final_Comfortably_Complicated_gluzu0.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186445/back_cover_fdod6b.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Lost In Love", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773187056/Lost_In_Love_PA_f1xokm.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186561/lost_in_love_back_hjew14.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Definition of Determination", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186739/DOD_d1bytt.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_600,q_auto,f_webp/v1773186991/dod_back_cover_jsjjoo.png", 
                phys: "#", digi: "#" 
            }
        ];

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const feed = document.getElementById('feed');
        let observer;

        // ================= CONTINUOUS FEED ENGINE =================
        function buildContinuousFeed() {
            const playlist =[
                ...rawChannels.featured.map(url => ({ url, category: 'featured' })),
                ...shuffle(rawChannels.duets).map(url => ({ url, category: 'duets' })),
                ...shuffle(rawChannels.munchtime).map(url => ({ url, category: 'munchtime' }))
            ];

            playlist.forEach((item, index) => {
                const slide = document.createElement('section');
                slide.className = 'slide';
                slide.setAttribute('data-category', item.category);
                slide.innerHTML = `
                    <video src="${item.url}" loop playsinline muted preload="metadata"></video>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60 pointer-events-none"></div>
                `;
                feed.appendChild(slide);
            });

            const feedObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const currentCat = entry.target.getAttribute('data-category');

                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        document.querySelectorAll('.tuner-btn').forEach(btn => btn.classList.remove('active'));
                        const activeBtn = document.getElementById(`tab-${currentCat}`);
                        if(activeBtn) activeBtn.classList.add('active');
                    } else {
                        video.pause();
                        video.currentTime = 0; 
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.slide').forEach(s => feedObserver.observe(s));
        }

        // ================= IMMERSIVE 3D COVERFLOW =================
        function buildCoverflow() {
            const track = document.getElementById('coverflow-track');
            
            albums.forEach((album) => {
                const item = document.createElement('div');
                item.className = 'album-card w-[70vw] max-w-[300px] flex-shrink-0 flex flex-col items-center';
                item.setAttribute('data-bg', album.front);
                
                item.innerHTML = `
                    <div class="relative w-full aspect-square perspective-1000 cursor-pointer mb-6" onclick="flipAlbum(this)">
                        <div class="flip-inner relative w-full h-full preserve-3d">
                            <!-- Front Cover -->
                            <div class="absolute inset-0 backface-hidden album-side bg-zinc-900">
                                <img src="${album.front}" class="w-full h-full object-cover">
                                <div class="glass-glare"></div>
                            </div>
                            <!-- Back Cover -->
                            <div class="absolute inset-0 backface-hidden rotate-y-180 album-side bg-zinc-900">
                                <img src="${album.back}" class="w-full h-full object-cover">
                                <div class="glass-glare"></div>
                            </div>
                        </div>
                        <div class="tap-indicator absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] uppercase font-black tracking-[0.3em] text-white whitespace-nowrap drop-shadow-md">
                            <span class="animate-pulse">Tap to Flip ↺</span>
                        </div>
                    </div>
                    
                    <!-- FIXED HEIGHT TITLE CONTAINER FOR PERFECT BUTTON ALIGNMENT -->
                    <div class="w-[110%] flex flex-col">
                        <div class="h-14 flex items-center justify-center mb-3">
                            <h3 class="text-xl md:text-2xl font-black italic uppercase text-center leading-tight drop-shadow-md">${album.title}</h3>
                        </div>
                        <div class="flex gap-2 justify-center w-full">
                            <a href="${album.phys}" class="flex-1 bg-white text-black py-3 text-[10px] uppercase tracking-widest font-black italic hover:invert transition-all text-center">PHYSICAL</a>
                            <a href="${album.digi}" class="flex-1 border-2 border-white/50 text-white py-3 text-[10px] uppercase tracking-widest font-black italic hover:bg-white hover:text-black transition-all text-center bg-black/50 backdrop-blur-sm">DIGITAL</a>
                        </div>
                    </div>
                `;
                track.appendChild(item);
            });

            // The Observer that triggers the "Wow Factor" Background Blur Sync
            const coverObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active-album');
                        // Change Ambient Background
                        const bgImg = entry.target.getAttribute('data-bg');
                        document.getElementById('store-bg').style.backgroundImage = `url('${bgImg}')`;
                    } else {
                        entry.target.classList.remove('active-album');
                        // Auto-Reset 3D Flip
                        const inner = entry.target.querySelector('.flip-inner');
                        if(inner && inner.classList.contains('rotate-y-180')) inner.classList.remove('rotate-y-180');
                    }
                });
            }, { root: track, threshold: 0.6 });

            document.querySelectorAll('.album-card').forEach(c => coverObserver.observe(c));
        }

        function flipAlbum(element) {
            const inner = element.querySelector('.flip-inner');
            inner.classList.toggle('rotate-y-180');
        }

        // ================= INIT & UI CONTROLS =================
        buildContinuousFeed();
        buildCoverflow();

        function scrollToCategory(cat) {
            const targetSlide = document.querySelector(`.slide[data-category="${cat}"]`);
            if(targetSlide) targetSlide.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            if (id === 'links') menu.classList.toggle('translate-y-full');
            else menu.classList.toggle('translate-x-full');
        }

        // GLOBAL TAP TO UNMUTE
        let isMuted = true;
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('.slide')) {
                const videos = document.querySelectorAll('video');
                isMuted = !isMuted;
                videos.forEach(v => v.muted = isMuted);
                document.getElementById('unmute-toast').style.opacity = '0';
            }
        });
    </script>
</body>
</html>
