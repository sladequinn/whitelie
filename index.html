<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { brutal:['"Inter Tight"', 'sans-serif'] },

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; touch-action: pan-y; }
        
        /* FILM GRAIN OVERLAY */
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* DESKTOP BOXING */
        .app-shell {
            width: 100%; height: 100dvh; max-width: 500px; margin: 0 auto;
            position: relative; background: #050505;
        }

        /* NATIVE VIDEO FEED */
        .feed {
            height: 100%; scroll-snap-type: y mandatory; overflow-y: scroll;
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .feed::-webkit-scrollbar { display: none; }
        .slide {
            height: 100%; scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; background: #000; display: flex; align-items: center; justify-content: center;
        }
        video {
            width: 100%; height: 100%; object-fit: contain; pointer-events: none;
            filter: contrast(1.15) brightness(0.9);
        }

        /* HUD UI */
        .hud-shadow { text-shadow: 0px 2px 10px rgba(0,0,0,0.9), 0px 0px 4px rgba(0,0,0,0.5); }
        .tuner-btn {
            font-size: 11px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
            opacity: 0.3; transition: all 0.2s; text-align: left;
        }
        .tuner-btn.active { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .tuner-btn.active::before { content: '■ '; font-size: 8px; vertical-align: middle; margin-right: 4px; }

        .overlay-menu {
            transition: transform 0.5s cubic-bezier(0.85, 0, 0.15, 1);
            background: #000;
        }

        /* STORE: THE EXPLODED VIEW COVERFLOW */
        .coverflow-container {
            scroll-snap-type: x mandatory; scrollbar-width: none; padding-bottom: 2rem;
        }
        .coverflow-container::-webkit-scrollbar { display: none; }

        .album-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1.1;
            display: flex; align-items: center; justify-content: center;
        }

        .cover-front, .cover-back {
            position: absolute; width: 85%; aspect-ratio: 1/1;
            object-fit: cover; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.1); filter: grayscale(100%) opacity(0.3);
        }
        
        .cover-back { z-index: 1; }
        .cover-front { z-index: 2; }

        .album-info-box {
            opacity: 0; transform: translateY(10px); transition: all 0.5s ease 0.2s;
            height: 120px; /* FIXED HEIGHT FOR PERFECT ALIGNMENT */
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* THE WOW FACTOR: ACTIVE STATE UNBOXING */
        .cover-item.active-cover .cover-back {
            filter: grayscale(0%) opacity(1);
            transform: translate(15%, 15%) scale(0.95);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 20px 20px 30px rgba(0,0,0,0.9);
        }
        
        .cover-item.active-cover .cover-front {
            filter: grayscale(0%) opacity(1);
            transform: translate(-15%, -15%) scale(1.05);
            border: 4px solid white;
            box-shadow: -15px -15px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255,255,255,0.1);
        }

        .cover-item.active-cover .album-info-box { opacity: 1; transform: translateY(0); }

        /* Store Background Marquee Text */
        .store-bg-text {
            position: absolute; top: 10%; left: -50%; width: 200%;
            font-size: 15rem; font-style: italic; font-weight: 900; line-height: 0.8;
            color: rgba(255,255,255,0.03); pointer-events: none; white-space: nowrap; z-index: 0;
            text-align: center;
        }
    </style>
</head>
<body class="font-brutal antialiased text-white selection:bg-white selection:text-black">

    <div class="noise"></div> <!-- Cinematic Grain -->

    <div class="app-shell">
        
        <!-- THE TUNER (TOP LEFT) -->

        <!-- THE ACTIONS (BOTTOM RIGHT) -->
        <div class="absolute bottom-10 right-6 z-[100] flex flex-col gap-3 items-end pointer-events-none">

                STORE

        <!-- VIDEO FEED -->

        <!-- TAP TO UNMUTE TOAST -->

            TAP TO UNMUTE
        </div>

        <!-- ================= OVERLAYS ================= -->
        
        <!-- LINKS OVERLAY -->
        <div id="links" class="fixed inset-0 z-[200] overlay-menu translate-y-full p-10 flex flex-col justify-center">
            <button onclick="toggleMenu('links')" class="absolute top-10 right-8 text-4xl font-light">✕</button>
            <div class="space-y-6 relative z-10">
                <a href="https://open.spotify.com/artist/6IgPg8MO2tPuQFHcM6MF4o" target="_blank" class="block text-5xl md:text-6xl italic font-black tracking-tighter hover:text-zinc-500 transition-colors">SPOTIFY</a>
                <a href="https://music.apple.com/ca/artist/lil-white-lie/1496696984" target="_blank" class="block text-5xl md:text-6xl italic font-black tracking-tighter hover:text-zinc-500 transition-colors">APPLE MUSIC</a>
                <a href="https://www.tiktok.com/@whitelie519" target="_blank" class="block text-5xl md:text-6xl italic font-black tracking-tighter hover:text-zinc-500 transition-colors">TIKTOK</a>
                <a href="https://www.instagram.com/lilwhitelie519" target="_blank" class="block text-5xl md:text-6xl italic font-black tracking-tighter hover:text-zinc-500 transition-colors">INSTAGRAM</a>
                <a href="https://www.youtube.com/@ThaLilWhiteLie" target="_blank" class="block text-5xl md:text-6xl italic font-black tracking-tighter hover:text-zinc-500 transition-colors">YOUTUBE</a>
            </div>
            <div class="store-bg-text">CONNECT</div>
        </div>

        <!-- STORE OVERLAY (EXPLODED VIEW) -->
        <div id="store" class="fixed inset-0 z-[200] overlay-menu translate-x-full flex flex-col border-l border-white/10">
            <div class="store-bg-text mt-20">DISCOGRAPHY</div>
            
            <div class="p-8 flex justify-between items-center shrink-0 relative z-10">
                <h2 class="text-6xl font-black italic tracking-tighter">STORE</h2>
                <button onclick="toggleMenu('store')" class="text-4xl font-light">✕</button>
            </div>
            
            <!-- APPAREL BANNER -->
            <div class="px-8 pb-4 shrink-0 relative z-10">
                <div class="bg-black/80 backdrop-blur-md border border-white/30 p-4 flex justify-between items-center shadow-2xl">
                    <div>
                        <p class="text-[9px] uppercase tracking-[0.3em] text-white/50 font-black mb-1">Apparel</p>
                        <p class="text-[14px] font-black italic tracking-tighter uppercase leading-tight">Hand-Pressed<br>Shirt</p>
                    </div>
                    <a href="#" class="bg-white text-black px-5 py-2 font-black italic text-xs hover:invert transition-all">BUY (45)</a>
                </div>
            </div>

            <!-- THE EXPLODED COVERFLOW -->
            <div id="coverflow-track" class="coverflow-container flex-1 flex overflow-x-auto items-center px-[15vw] gap-12 pt-8 relative z-10">
                <!-- Albums injected here via JS -->
            </div>
            
            <p class="shrink-0 mt-auto text-[9px] bg-black uppercase font-black tracking-[0.3em] text-center border-t border-white/10 py-5 relative z-10">
                Hand-pressed & Shipped by WH!TE L!E
            </p>
        </div>

    </div>

    <script>
        // ================= CLOUDINARY MEDIA DATABASE =================
        const rawChannels = {
            featured:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772865207/9ac2a10c-e3bd-4fa4-b3c1-7ddaaf0afd07_jtslel.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772865413/e4330852-b73c-4137-ad3b-8f5e9d4a828f_oktni5.mp4"
            ],
            duets:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856943/duet19_r9wyag.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856867/duet22_etriid.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856940/duet21_seeax3.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856727/duet20_dv5yxm.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856692/duet18_ufz9re.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856835/duet17_twjmqf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856663/duet16_wqgbjh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856656/duet15_efyme5.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856335/duet14_kbkj3b.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856654/duet13_fqyegf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856624/duet12_vqtdcu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856685/duet11_ws0hlu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856642/duet9_x42piu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856217/duet8_y7z0kj.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856600/duet7_ctichu.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856825/duet6_e4bcvh.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856946/duet5_llnphi.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772858770/duet4_xy7bfo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856926/duet1_xekrbc.mp4" 
            ],
            munchtime:[
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856577/munch16_n9zwcf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856535/munch15_l1u9pw.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856940/munch14_yfykbo.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856937/munch13_izmxzv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856508/munch12_py2qhz.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856789/munch11_cehftv.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856787/munch10_fuun0d.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856521/munch9_av3pxa.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856474/munch8_cg04mf.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856445/munch7_vccuzr.mp4",
                "https://res.cloudinary.com/dj3uocb74/video/upload/v1772856414/munch5_joqhhr.mp4"
            ]
        };

        // ================= FAST-LOADING IMAGE DATABASE =================
        // Added 'w_800,q_auto,f_auto' to force Cloudinary to compress and load images instantly
        const albums =[
            { 
                title: "Antisocial Antihero", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186502/1_bbscj6.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186501/7_wurki1.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Hustle vs Hunger", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186230/20220525_175420_0000_fxxpae.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186245/20220525_210420_0000_serjc7.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Comfortably Complicated", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186419/Final_Comfortably_Complicated_gluzu0.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186445/back_cover_fdod6b.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Lost In Love", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773187056/Lost_In_Love_PA_f1xokm.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186561/lost_in_love_back_hjew14.png", 
                phys: "#", digi: "#" 
            },
            { 
                title: "Definition of Determination", 
                front: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186739/DOD_d1bytt.png", 
                back: "https://res.cloudinary.com/dj3uocb74/image/upload/w_800,q_auto,f_auto/v1773186991/dod_back_cover_jsjjoo.png", 
                phys: "#", digi: "#" 
            }
        ];

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const feed = document.getElementById('feed');
        let observer;

        // ================= BUILD CONTINUOUS FEED =================
        function buildContinuousFeed() {
            const playlist =[
                ...rawChannels.featured.map(url => ({ url, category: 'featured' })),
                ...shuffle(rawChannels.duets).map(url => ({ url, category: 'duets' })),
                ...shuffle(rawChannels.munchtime).map(url => ({ url, category: 'munchtime' }))
            ];

            playlist.forEach((item, index) => {
                const slide = document.createElement('section');
                slide.className = 'slide';
                slide.setAttribute('data-category', item.category);
                slide.innerHTML = `
                    <video src="${item.url}" loop playsinline muted preload="metadata"></video>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60 pointer-events-none"></div>
                `;
                feed.appendChild(slide);
            });

            const feedObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const currentCat = entry.target.getAttribute('data-category');

                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        document.querySelectorAll('.tuner-btn').forEach(btn => btn.classList.remove('active'));
                        const activeBtn = document.getElementById(`tab-${currentCat}`);
                        if(activeBtn) activeBtn.classList.add('active');
                    } else {
                        video.pause();
                        video.currentTime = 0; 
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.slide').forEach(s => feedObserver.observe(s));
        }

        // ================= BUILD EXPLODED COVERFLOW =================
        function buildCoverflow() {
            const track = document.getElementById('coverflow-track');
            
            albums.forEach((album) => {
                const item = document.createElement('div');
                item.className = 'cover-item snap-center shrink-0 w-[70vw] max-w-[320px] flex flex-col items-center';
                
                item.innerHTML = `
                    <div class="album-wrapper">
                        <img src="${album.back}" class="cover-back">
                        <img src="${album.front}" class="cover-front">
                    </div>
                    
                    <div class="album-info-box w-[110%] mt-8 text-center">
                        <h3 class="text-xl md:text-2xl font-black italic uppercase leading-tight line-clamp-2">${album.title}</h3>
                        <div class="flex gap-2 justify-center w-full mt-auto">
                            <a href="${album.phys}" class="flex-1 bg-white text-black py-3 text-[10px] uppercase tracking-widest font-black italic hover:bg-zinc-300 transition-colors shadow-lg">PHYSICAL CD</a>
                            <a href="${album.digi}" class="flex-1 border-2 border-white/50 text-white py-3 text-[10px] uppercase tracking-widest font-black italic hover:bg-white hover:text-black transition-colors">DIGITAL DL</a>
                        </div>
                    </div>
                `;
                track.appendChild(item);
            });

            const coverObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active-cover');
                    } else {
                        entry.target.classList.remove('active-cover');
                    }
                });
            }, { root: track, threshold: 0.7 });

            document.querySelectorAll('.cover-item').forEach(c => coverObserver.observe(c));
        }

        // ================= INIT & UI CONTROLS =================
        buildContinuousFeed();
        buildCoverflow();

        function scrollToCategory(cat) {
            const targetSlide = document.querySelector(`.slide[data-category="${cat}"]`);
            if(targetSlide) targetSlide.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            if (id === 'links') menu.classList.toggle('translate-y-full');
            else menu.classList.toggle('translate-x-full');
        }

        let isMuted = true;
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('.slide')) {
                const videos = document.querySelectorAll('video');
                isMuted = !isMuted;
                videos.forEach(v => v.muted = isMuted);
                document.getElementById('unmute-toast').style.opacity = '0';
            }
        });
    </script>
</body>
</html>
